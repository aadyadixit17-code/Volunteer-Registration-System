<!DOCTYPE html>
<html>
<head>
    <title>Volunteer Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS (optional) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container mt-4">

<!-- HEADER -->
<div class="text-center mb-4">
    <h1 class="text-primary">Volunteer Dashboard</h1>
    <p class="text-muted">Manage all registered volunteers</p>
</div>

<!-- TOP ACTIONS -->
<div class="d-flex justify-content-between mb-3">

    <a href="/download" class="btn btn-success">
        Download Report
    </a>

    <form method="GET" action="/dashboard" class="d-flex">

        <input type="text"
               name="search"
               class="form-control me-2"
               placeholder="Search Volunteer">

        <button type="submit" class="btn btn-primary">
            Search
        </button>

    </form>

</div>

<!-- TABLE -->
<table class="table table-striped table-hover table-bordered text-center">

    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Skills</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>

    {% for volunteer in volunteers %}

        <tr>
            <td>{{ volunteer[0] }}</td>
            <td>{{ volunteer[1] }}</td>
            <td>{{ volunteer[2] }}</td>
            <td>{{ volunteer[3] }}</td>
            <td>{{ volunteer[4] }}</td>

            <td>

                <!-- EDIT BUTTON -->
                <a href="/edit/{{ volunteer[0] }}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <!-- DELETE BUTTON -->
                <a href="/delete/{{ volunteer[0] }}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this volunteer?')">
                    Delete
                </a>

            </td>
        </tr>

    {% endfor %}

    </tbody>

</table>

</body>
</html>
