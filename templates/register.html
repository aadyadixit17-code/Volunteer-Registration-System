<!DOCTYPE html>
<html>
<head>

    <title>Volunteer Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4 mx-auto" style="max-width:600px;">

        <h1 class="text-center text-primary mb-4">
            Volunteer Registration
        </h1>

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input type="text"
                       name="name"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text"
                       name="phone"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Skills</label>
                <input type="text"
                       name="skills"
                       class="form-control"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100">
                Register
            </button>

        </form>

    </div>

</div>

</body>
</html>
